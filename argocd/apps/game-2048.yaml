apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: game-2048
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/RompfRobert/datavisyn-devops-challenge
    targetRevision: master
    path: helm/game-2048
    helm:
      values: |
        ingress:
          enabled: true
          className: nginx
          hosts: []
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
