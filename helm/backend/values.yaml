replicaCount: 1

nameOverride: ""
fullnameOverride: ""

image:
  repository: hashicorp/http-echo
  pullPolicy: IfNotPresent
  tag: "1.0.0"

containerPort: 5678
echoText: "hello from backend"

service:
  type: ClusterIP
  port: 80
  targetPort: 5678
  internalTrafficPolicy: Cluster

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: backend.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
