{{- if .Values.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "game-2048.fullname" . }}-oauth2-proxy
  labels:
    {{- include "game-2048.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  replicas: {{ .Values.oauth2Proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "game-2048.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: oauth2-proxy
  template:
    metadata:
      labels:
        {{- include "game-2048.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: oauth2-proxy
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          args:
            - --provider={{ .Values.oauth2Proxy.provider }}
            - --http-address=0.0.0.0:4180
            {{- if .Values.oauth2Proxy.upstream }}
            - --upstream={{ .Values.oauth2Proxy.upstream }}
            {{- else }}
            - --upstream=http://{{ include "game-2048.fullname" . }}-frontend:{{ .Values.frontend.service.port }}
            {{- end }}
            - --email-domain={{ .Values.oauth2Proxy.emailDomain }}
            - --cookie-secure={{ .Values.oauth2Proxy.cookieSecure }}
            - --cookie-name={{ .Values.oauth2Proxy.cookieName }}
            - --cookie-expire={{ .Values.oauth2Proxy.cookieExpire }}
            {{- if .Values.oauth2Proxy.redirectURL }}
            - --redirect-url={{ .Values.oauth2Proxy.redirectURL }}
            {{- end }}
            {{- with .Values.oauth2Proxy.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.oauth2Proxy.existingSecret }}{{ .Values.oauth2Proxy.existingSecret }}{{ else }}{{ include "game-2048.fullname" . }}-oauth2-proxy{{ end }}
                  key: {{ .Values.oauth2Proxy.secretKeys.clientIDKey }}
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.oauth2Proxy.existingSecret }}{{ .Values.oauth2Proxy.existingSecret }}{{ else }}{{ include "game-2048.fullname" . }}-oauth2-proxy{{ end }}
                  key: {{ .Values.oauth2Proxy.secretKeys.clientSecretKey }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.oauth2Proxy.existingSecret }}{{ .Values.oauth2Proxy.existingSecret }}{{ else }}{{ include "game-2048.fullname" . }}-oauth2-proxy{{ end }}
                  key: {{ .Values.oauth2Proxy.secretKeys.cookieSecretKey }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.oauth2Proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.oauth2Proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oauth2Proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oauth2Proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
