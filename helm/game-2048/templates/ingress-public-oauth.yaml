{{- if and .Values.ingress.enabled .Values.oauth2Proxy.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "game-2048.fullname" . }}-oauth2
  labels:
    {{- include "game-2048.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
  annotations:
    # Public OAuth endpoint - no auth required
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: {{ include "game-2048.fullname" . }}-oauth2-proxy
                port:
                  number: {{ .Values.oauth2Proxy.service.port }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
