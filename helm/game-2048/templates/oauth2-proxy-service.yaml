{{- if .Values.oauth2Proxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "game-2048.fullname" . }}-oauth2-proxy
  labels:
    {{- include "game-2048.labels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.oauth2Proxy.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "game-2048.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: oauth2-proxy
{{- end }}
