{{- if and .Values.ingress.enabled .Values.ingress.auth.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "game-2048.fullname" . }}-protected
  labels:
    {{- include "game-2048.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
  annotations:
    # nginx-ingress auth annotations for oauth2-proxy
    nginx.ingress.kubernetes.io/auth-url: "http://{{ include "game-2048.fullname" . }}-oauth2-proxy.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.oauth2Proxy.service.port }}/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "http://$host/oauth2/start?rd=$escaped_request_uri"
    {{- with .Values.ingress.auth.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: {{ .Values.ingress.frontend.path }}
            pathType: {{ default "Prefix" .Values.ingress.frontend.pathType }}
            backend:
              service:
                name: {{ include "game-2048.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
          {{- if .Values.ingress.backend.enabled }}
          - path: {{ .Values.ingress.backend.path }}
            pathType: {{ default "Prefix" .Values.ingress.backend.pathType }}
            backend:
              service:
                name: {{ include "game-2048.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
