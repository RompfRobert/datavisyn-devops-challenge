imagePullSecrets: []

serviceAccount:
  create: false
  name: ""
  annotations: {}
  automount: false

podAnnotations: {}

podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}

frontend:
  replicaCount: 1
  image:
    repository: public.ecr.aws/l6m2t8p7/docker-2048
    tag: latest
    pullPolicy: IfNotPresent
  containerPort: 80
  service:
    type: ClusterIP
    port: 80
  resources: {}
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

backend:
  replicaCount: 1
  image:
    repository: hashicorp/http-echo
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  args:
    - "-listen=:5678"
    - "-text=backend ok"
  containerPort: 5678
  service:
    type: ClusterIP
    port: 5678
  resources: {}
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts: []
  frontend:
    path: /
    pathType: Prefix
  backend:
    enabled: true
    path: /api
    pathType: Prefix
  tls: []
  auth:
    enabled: false
    annotations: {}

oauth2Proxy:
  enabled: false
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.6.0
    pullPolicy: IfNotPresent
  provider: github
  clientID: ""
  clientSecret: ""
  cookieSecret: ""
  existingSecret: oauth2-proxy-secret
  secretKeys:
    clientIDKey: client-id
    clientSecretKey: client-secret
    cookieSecretKey: cookie-secret
  emailDomain: "*"
  cookieSecure: false
  cookieName: "_oauth2_proxy"
  cookieExpire: "8h"
  redirectURL: ""
  upstream: ""
  extraArgs: []
  replicaCount: 1
  service:
    port: 4180
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
